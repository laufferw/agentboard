server {
    listen 80;
    server_name agentboard.fyi www.agentboard.fyi;

    # Frontend — serve static files
    root /home/wll/.openclaw/workspace/agentboard/frontend/dist;
    index index.html;

    # API — proxy to Fastify backend
    location /.well-known/ {
        proxy_pass http://127.0.0.1:3100/.well-known/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/ {
        proxy_pass http://127.0.0.1:3100/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # SPA fallback — all routes go to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
